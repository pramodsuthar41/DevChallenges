    <title>Business Blog Card | devChallenges.io</title>
  </head>
  <body>
    <main>
      <section class="card-container">
        <div class="card">
          <div class="img-card">
            <img src="images/hero-image-1.jpg" alt="" class="hero-img"/>
            <img src="images/white-overlay.svg" alt="" class="img-overlay">
          </div>
          <div class="content">
            <h1 class="title">Perfect solution for small business</h1>
            <p class="para">Small businesses need to generate leads to grow. You can use tools like Ringy.</p>
            <div class="line"></div>
            <div class="profile">
              <img src="images/avatar-image-business-card-1.png" alt="">
              <div class="info">
                <span class="name">Amy Burgess</span>
                <span class="role">Customer Manger, Solution Oy</span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
